<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Flight Simulator</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Import Map for Three.js and add-ons -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "simplex-noise": "https://unpkg.com/simplex-noise@4.0.1/dist/esm/simplex-noise.js"
        }
    }
    </script>
</head>
<body>
    <div id="ui-container">
        <h1>Voxel Flight Sim</h1>
        <p>Controls: Arrow Keys to pitch/roll. W/S to throttle.</p>
        <div id="telemetry">
            Speed: <span id="speed-display">0</span><br>
            Alt: <span id="alt-display">0</span>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
